<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="signin.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    
    <div class="left-panel">
      <form class="form" >

        <label for="name">Name :</label>
        <div class="input-wrapper">
          <input id="name" type="text" placeholder="Name" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
        </div>

        <label for="email">Email :</label>
        <div class="input-wrapper">
          <input id="email" type="email" placeholder="email" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
          </span>
        </div>

        <label for="password">Password:</label>
        <div class="input-wrapper">
          <input id="password" type="password" placeholder="Password" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              <circle cx="12" cy="16" r="1" />
            </svg>
          </span>
        </div>

        <label for="confirmPassword">Confirm Password :</label>
        <div class="input-wrapper">
          <input id="confirmPassword" type="password" placeholder="Password:" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              <circle cx="12" cy="16" r="1" />
            </svg>
          </span>
        </div>

        <button type="submit" class="btn-sign-in">Sign in</button>
      </form>
    </div>

 
    <div class="right-panel">
      <h1 >Welcome<br />to Nisca</h1>
      <p>Log in to discover flowers made for <br> your special moments.</p>
      <a href="login.html" class="btn-log-in">Log in</a>
    </div>

  </div>
</body>
</html>
