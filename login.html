<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Welcome<br />Back !</h1>
      <p>Sign in and turn simple moments<br> into beautiful memories.</p>
      <a href="signin.html" class="btn-sign-in">Sign in</a>
    </div>

    <div class="right-panel">
      <form class="form">
        <label for="name">Name :</label>
        <div class="input-wrapper">
          <input id="name" type="text" placeholder="Name" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
        </div>

        <label for="password">Password:</label>
        <div class="input-wrapper">
          <input id="password" type="password" placeholder="Password" />
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              <circle cx="12" cy="16" r="1" />
            </svg>
          </span>
        </div>

        <button type="submit" class="btn-log-in">Log In</button>
      </form>
    </div>

  </div>
</body>
</html>
